name: smart_closet_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  google_sign_in: ^6.2.2
  
  # State management
  provider: ^6.1.2
  
  # HTTP & API
  dio: ^5.4.3+1

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Location & Weather
  geolocator: ^13.0.1

  # Storage
  shared_preferences: ^2.3.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0

  # Env
  flutter_dotenv: ^5.2.1

  # Utils

  google_fonts: ^8.0.2

  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  go_router: ^17.2.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/locales/

  #   - images/a_dot_ham.jpeg

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/Playfair_9pt-Regular.ttf
        - asset: assets/fonts/Playfair_9pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Playfair_9pt-Italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
